apiVersion: v1
kind: ConfigMap
metadata:
  name: openburo-services
  namespace: default
data:
  services.yaml: |
    services:
      - id: mytwake
        type: twake
        url: https://your-instance.twake.example
        token: your-bearer-token-here
        verify_tls: true

      - id: mygdrive
        type: gdrive
        url: https://www.googleapis.com/drive/v3
        token: your-oauth2-access-token
        verify_tls: true

      - id: mynextcloud
        type: nextcloud
        url: https://your-nextcloud.example
        # JWT whose payload contains `user` and `password` claims (Basic auth)
        token: your-nextcloud-jwt-here
        verify_tls: true

      - id: myjamespot
        type: jamespot
        url: https://your-instance.jamespot.example
        # JWT whose payload contains `client_id`, `client_secret` and `refresh_token`
        token: your-jamespot-jwt-here
        verify_tls: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openburo
  namespace: default
  labels:
    app: openburo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openburo
  template:
    metadata:
      labels:
        app: openburo
    spec:
      containers:
        - name: openburo
          image: openburo:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: services-config
              mountPath: /app/services.yaml
              subPath: services.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: services-config
          configMap:
            name: openburo-services
---
apiVersion: v1
kind: Service
metadata:
  name: openburo
  namespace: default
  labels:
    app: openburo
spec:
  type: ClusterIP
  selector:
    app: openburo
  ports:
    - name: http
      port: 80
      targetPort: http
