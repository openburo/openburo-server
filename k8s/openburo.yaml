apiVersion: v1
kind: Secret
metadata:
  name: openburo-cozy
  namespace: openburo
type: Opaque
stringData:
  COZY_URL: "https://your-instance.cozy.example"
  COZY_TOKEN: "your-bearer-token-here"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openburo
  namespace: openburo
  labels:
    app: openburo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openburo
  template:
    metadata:
      labels:
        app: openburo
    spec:
      containers:
        - name: openburo
          image: openburo:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: openburo-cozy
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: openburo
  namespace: openburo
  labels:
    app: openburo
spec:
  type: ClusterIP
  selector:
    app: openburo
  ports:
    - name: http
      port: 80
      targetPort: http
