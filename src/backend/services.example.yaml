services:
  - id: mytwake
    type: twake
    url: https://your-instance.twake.example
    token: your-bearer-token-here
    verify_tls: true

  - id: mygdrive
    type: gdrive
    url: https://www.googleapis.com/drive/v3
    token: your-oauth2-access-token
    verify_tls: true

  - id: myjamespot
    type: jamespot
    url: https://your-instance.jamespot.example
    # JWT whose payload contains `client_id`, `client_secret` and `refresh_token`
    token: your-jamespot-jwt-here
    verify_tls: true

  - id: mynextcloud
    type: nextcloud
    url: https://your-nextcloud.example
    # JWT whose payload contains `user` and `password` claims (Basic auth)
    token: your-nextcloud-jwt-here
    verify_tls: true

  # Remote OpenBURO-certified service (auto-discovers via .well-known)
  - id: remote-drive
    type: openburo
    url: https://remote-service.example
    token: optional-bearer-token
    verify_tls: true
